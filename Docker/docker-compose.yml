services:

  debian_lab:
    image: debian:stable-slim
    container_name: debian_lab
    tty: true
    stdin_open: true
    volumes:
      - ../Bash:/lab/bash

  mysql_server:
    image: mysql:8.0
    container_name: mysql_server
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: etudiants
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  apache_server:
    image: httpd:latest
    container_name: apache_server
    ports:
      - "8080:80"
    volumes:
      - ../web:/usr/local/apache2/htdocs

volumes:
  mysql_data: